<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    html, body {
        margin: 0;
        height: 100%;
    }

    body {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 16px;
        box-sizing: border-box;
        color: white;
        font-family: -apple-system, system-ui, sans-serif;
        background: #7a0000;
    }

    #label {
        font-size: 15px;
        font-weight: 600;
    }

    #origin {
        font-size: 12px;
        opacity: 0.75;
    }

    button {
        border: none;
        border-radius: 999px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 600;
        color: #7a0000;
        background: white;
        cursor: pointer;
    }
</style>
</head>
<body>
    <div>
        <div id="label">Cross-origin banner</div>
        <div id="origin"></div>
    </div>
    <button onclick="console.log('Clicked inside cross-origin frame.')">Dismiss</button>
    <script>
        document.getElementById("origin").textContent = location.origin;
    </script>
</body>
</html>
